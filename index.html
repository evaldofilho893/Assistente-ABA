<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0097B2">
  <title>Prontuário ABA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div><strong>Prontuário ABA</strong><span>offline local • v3 paciente + planner</span></div>
    <nav>
      <button data-view="dashboard" class="active">Início</button>
      <button data-view="patients">Pacientes</button>
      <button data-view="planner">Planner</button>
      <button data-view="calendar">Agenda</button>
      <button data-view="backup">Backup</button>
    </nav>
  </header>

  <main>
    <section id="dashboard" class="view active"></section>
    <section id="patients" class="view"></section>
    <section id="patient-detail" class="view"></section>
    <section id="planner" class="view"></section>
    <section id="calendar" class="view"></section>
    <section id="backup" class="view"></section>
  </main>

  <dialog id="modal"><div id="modal-content"></div></dialog>
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
